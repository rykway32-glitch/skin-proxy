<script>
  // 1. 压缩图片函数
  async function compressImage(dataUrl) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxW = 800;
        const ratio = Math.min(maxW / img.width, maxW / img.height, 1);
        canvas.width = img.width * ratio;
        canvas.height = img.height * ratio;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.6).split(',')[1]);
      };
      img.src = dataUrl;
    });
  }

  // 2. 基础配置与变量
  const PROXY_URL = 'https://skin-proxy-flax.vercel.app/api/skin-analyze';
  const PROG = {
    hydration: { label: '补水', cls: 'b-hydration' },
    pore_tighten: { label: '收缩毛孔', cls: 'b-pore_tighten' },
    dry_care: { label: '干燥护理', cls: 'b-dry_care' },
    oil_control: { label: '出油护理', cls: 'b-oil_control' },
  };

  let stream = null;
  let facingMode = 'user';
  let capturedImage = null;
  let loadingTimer = null;

  // 3. 页面路由
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const target = document.getElementById(id);
    if (target) target.classList.add('active');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // 4. 摄像头控制
  async function startCamera() {
    try {
      if (stream) stopCamera();
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      document.getElementById('video').srcObject = stream;
    } catch (err) {
      console.error(err);
      showToast('无法打开摄像头，请检查权限');
    }
  }

  function stopCamera() {
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
      stream = null;
    }
  }

  function toggleCamera() {
    facingMode = facingMode === 'user' ? 'environment' : 'user';
    startCamera();
  }

  function capturePhoto() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    if (!stream) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    capturedImage = canvas.toDataURL('image/jpeg');
    document.getElementById('preview-img').src = capturedImage;
    stopCamera();
    showPage('page-preview');
  }

  function retakePhoto() {
    showPage('page-capture');
    startCamera();
  }

  // 5. AI 分析逻辑
  function startAnalysis() {
    if (!capturedImage) return;
    showPage('page-loading');
    let step = 1;
    document.querySelectorAll('.l-step').forEach(s => s.classList.remove('active', 'done'));
    document.getElementById('ls1').classList.add('active');

    loadingTimer = setInterval(() => {
      document.getElementById(`ls${step}`).classList.remove('active');
      document.getElementById(`ls${step}`).classList.add('done');
      step++;
      if (step <= 4) {
        document.getElementById(`ls${step}`).classList.add('active');
      } else {
        clearInterval(loadingTimer);
      }
    }, 1500);

    compressImage(capturedImage).then(base64Str => {
      return fetch(PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: base64Str })
      });
    })
    .then(res => {
      if (!res.ok) throw new Error('分析失败');
      return res.json();
    })
    .then(data => {
      clearInterval(loadingTimer);
      renderResult(data);
      showPage('page-result');
    })
    .catch(err => {
      clearInterval(loadingTimer);
      console.error(err);
      showToast('分析出错，请重试');
      showPage('page-capture');
      startCamera();
    });
  }

  // 6. 结果渲染
  function renderResult(data) {
    const container = document.getElementById('result-container');
    let html = `
      <div class="result-header">
        <div class="score-circle">
          <div class="score-num">${data.score || 85}</div>
          <div class="score-label">综合评分</div>
        </div>
        <h2 style="margin-top:16px;font-size:20px">${data.skin_type || '混合性肌肤'}</h2>
      </div>
      <div class="report-card">
        <h3>📊 区域状态分析</h3>
    `;
    
    if (data.zones && Array.isArray(data.zones)) {
      data.zones.forEach(z => {
        html += `
          <div class="zone-item">
            <span class="zone-name">${z.zone}</span>
            <span class="zone-status">${z.status}</span>
          </div>
        `;
      });
    } else {
      html += '<p style="color:#888;font-size:14px">暂无区域详细数据</p>';
    }
    
    html += `
      </div>
      <div class="report-card">
        <h3>💡 专属护肤程序推荐</h3>
    `;
    
    if (data.programs && Array.isArray(data.programs)) {
      data.programs.forEach(p => {
        const meta = PROG[p.id] || { label: p.id, cls: 'b-hydration' };
        html += `
          <div class="prog-item ${meta.cls}">
            <div class="prog-title">${meta.label}</div>
            <div class="prog-desc">${p.desc}</div>
          </div>
        `;
      });
    } else {
      html += '<p style="color:#888;font-size:14px">暂无推荐程序</p>';
    }
    
    html += `
      </div>
      <button class="big-btn btn-primary" onclick="retakePhoto()" style="margin-top:24px">重新测试</button>
    `;
    container.innerHTML = html;
  }

  // 初始化启动
  window.onload = () => {
    showPage('page-capture');
    startCamera();
  };
</script>
