<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 皮肤分析</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }
  .container { max-width: 520px; margin: 0 auto; padding: 24px 16px; }
  .header { text-align: center; margin-bottom: 28px; }
  .header h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .header p { font-size: 14px; color: #888; }
  .zones { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .zone { background: #fff; border: 1.5px dashed #ddd; border-radius: 12px; padding: 14px 8px; text-align: center; cursor: pointer; transition: all .2s; position: relative; }
  .zone:hover { border-color: #1D9E75; }
  .zone.uploaded { border-color: #1D9E75; border-style: solid; }
  .zone input { display: none; }
  .zone-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .zone-status { font-size: 11px; color: #aaa; }
  .zone.uploaded .zone-status { color: #1D9E75; }
  .zone-preview { width: 100%; height: 64px; object-fit: cover; border-radius: 8px; margin-bottom: 6px; }
  .analyze-btn { width: 100%; padding: 14px; background: #1D9E75; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; transition: background .2s; display: none; }
  .analyze-btn:hover { background: #0F6E56; }
  .analyze-btn:disabled { background: #ccc; cursor: not-allowed; }
  .loading { text-align: center; padding: 32px; background: #fff; border-radius: 12px; }
  .spinner { width: 36px; height: 36px; border: 3px solid #eee; border-top-color: #1D9E75; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 14px; color: #888; }
  .result { background: #fff; border-radius: 16px; padding: 20px; }
  .result-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #f0f0f0; }
  .score-circle { width: 60px; height: 60px; border-radius: 50%; background: #E1F5EE; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
  .score-num { font-size: 20px; font-weight: 700; color: #0F6E56; line-height: 1; }
  .score-label { font-size: 10px; color: #1D9E75; }
  .summary { font-size: 14px; color: #444; line-height: 1.5; }
  .zone-result { padding: 12px 0; border-bottom: 1px solid #f5f5f5; }
  .zone-result:last-of-type { border-bottom: none; }
  .zone-result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .zone-result-name { font-size: 13px; font-weight: 500; }
  .prog-tag { font-size: 12px; padding: 2px 10px; border-radius: 20px; font-weight: 500; }
  .tag-hydration { background: #E6F1FB; color: #185FA5; }
  .tag-pore_tighten { background: #EEEDFE; color: #534AB7; }
  .tag-dry_care { background: #FAEEDA; color: #854F0B; }
  .tag-oil_control { background: #FAECE7; color: #993C1D; }
  .zone-details { font-size: 12px; color: #888; }
  .start-btn { width: 100%; padding: 14px; background: #1D9E75; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 20px; transition: background .2s; }
  .start-btn:hover { background: #0F6E56; }
  .restart-btn { width: 100%; padding: 11px; background: transparent; color: #888; border: 1px solid #ddd; border-radius: 12px; font-size: 14px; cursor: pointer; margin-top: 10px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .section-title { font-size: 12px; color: #aaa; font-weight: 500; letter-spacing: .5px; text-transform: uppercase; margin: 16px 0 8px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>AI 皮肤分析</h1>
    <p>上传各区域皮肤照片，AI 匹配最适合的护肤程序</p>
  </div>

  <div id="upload-view">
    <div class="zones" id="zones"></div>
    <button class="analyze-btn" id="analyze-btn" onclick="runAnalysis()">开始 AI 皮肤分析</button>
  </div>

  <div id="loading-view" style="display:none">
    <div class="loading">
      <div class="spinner"></div>
      <p>AI 正在分析你的皮肤状态…</p>
    </div>
  </div>

  <div id="result-view" style="display:none"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ⚠️ 把下面的网址替换成你的 Vercel 地址
const PROXY_URL = 'https://skin-proxy-flax.vercel.app/api/skin-analyze';

const ZONES = [
  { id: 'forehead',   name: '额头',   key: 'zone_1_forehead' },
  { id: 'nose',       name: '鼻翼',   key: 'zone_2_nose' },
  { id: 'leftcheek',  name: '左脸颊', key: 'zone_3_left_cheek' },
  { id: 'rightcheek', name: '右脸颊', key: 'zone_4_right_cheek' },
  { id: 'chin',       name: '下巴',   key: 'zone_5_chin' },
];

const PROG_LABELS = {
  hydration:    { label: '补水',     cls: 'tag-hydration' },
  pore_tighten: { label: '收缩毛孔', cls: 'tag-pore_tighten' },
  dry_care:     { label: '干燥护理', cls: 'tag-dry_care' },
  oil_control:  { label: '出油护理', cls: 'tag-oil_control' },
};

const images = {};

// 渲染上传区域
function renderZones() {
  document.getElementById('zones').innerHTML = ZONES.map(z => `
    <div class="zone ${images[z.id] ? 'uploaded' : ''}" id="zone-${z.id}" onclick="document.getElementById('file-${z.id}').click()">
      ${images[z.id] ? `<img src="${images[z.id].dataUrl}" class="zone-preview">` : ''}
      <div class="zone-name">${z.name}</div>
      <div class="zone-status">${images[z.id] ? '✓ 已上传' : '点击上传'}</div>
      <input type="file" id="file-${z.id}" accept="image/*" onchange="handleFile('${z.id}', this)">
    </div>
  `).join('');
  const count = Object.keys(images).length;
  const btn = document.getElementById('analyze-btn');
  btn.style.display = count > 0 ? 'block' : 'none';
  btn.textContent = `开始 AI 皮肤分析（已上传 ${count}/5）`;
}

function handleFile(id, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    images[id] = { dataUrl: e.target.result, base64: e.target.result.split(',')[1], type: file.type };
    renderZones();
  };
  reader.readAsDataURL(file);
}

async function runAnalysis() {
  document.getElementById('upload-view').style.display = 'none';
  document.getElementById('loading-view').style.display = 'block';

  const contentParts = [];
  ZONES.forEach((z, i) => {
    if (!images[z.id]) return;
    contentParts.push({ type: 'image', source: { type: 'base64', media_type: images[z.id].type, data: images[z.id].base64 } });
    contentParts.push({ type: 'text', text: `图${i+1}为${z.name}区域` });
  });

  contentParts.push({ type: 'text', text: `你是专业皮肤管理专家。分析以上皮肤图片，为每个分区选择最合适的护理程序。
设备程序：hydration（补水，适合缺水/正常肤质），pore_tighten（收缩毛孔，适合毛孔粗大），dry_care（干燥护理，适合明显干燥/脱皮），oil_control（出油护理，适合油脂旺盛/痘痘）。
严格输出JSON格式，不含其他文字：{"overall_score":85,"skin_summary":"一句话总结","zones":[{"zone":"额头","condition":"描述","program":"hydration"},{"zone":"鼻翼","condition":"描述","program":"pore_tighten"},{"zone":"左脸颊","condition":"描述","program":"dry_care"},{"zone":"右脸颊","condition":"描述","program":"dry_care"},{"zone":"下巴","condition":"描述","program":"oil_control"}],"device_commands":{"zone_1_forehead":"hydration","zone_2_nose":"pore_tighten","zone_3_left_cheek":"dry_care","zone_4_right_cheek":"dry_care","zone_5_chin":"oil_control"}}` });

  try {
    const resp = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: [{ role: 'user', content: contentParts }] })
    });
    const data = await resp.json();
    const raw = (data.content || []).map(b => b.text || '').join('');
    const result = JSON.parse(raw.replace(/```json|```/g, '').trim());
    showResult(result);
  } catch (e) {
    document.getElementById('loading-view').style.display = 'none';
    document.getElementById('upload-view').style.display = 'block';
    showToast('分析失败，请重试：' + e.message);
  }
}

function showResult(r) {
  document.getElementById('loading-view').style.display = 'none';
  const zoneRows = (r.zones || []).map(z => {
    const p = PROG_LABELS[z.program] || { label: z.program, cls: '' };
    return `<div class="zone-result">
      <div class="zone-result-header">
        <span class="zone-result-name">${z.zone}</span>
        <span class="prog-tag ${p.cls}">${p.label}</span>
      </div>
      <div class="zone-details">${z.condition || ''}</div>
    </div>`;
  }).join('');

  document.getElementById('result-view').innerHTML = `
    <div class="result">
      <div class="result-header">
        <div class="score-circle">
          <span class="score-num">${r.overall_score || '--'}</span>
          <span class="score-label">评分</span>
        </div>
        <div class="summary">${r.skin_summary || ''}</div>
      </div>
      <div class="section-title">各区域分析</div>
      ${zoneRows}
      <button class="start-btn" onclick="startDevice(${JSON.stringify(r.device_commands || {})})">
        一键启动护肤体验
      </button>
      <button class="restart-btn" onclick="restart()">重新分析</button>
    </div>
  `;
  document.getElementById('result-view').style.display = 'block';
}

function startDevice(commands) {
  fetch('http://skindevice.local:8080/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(commands)
  }).then(() => showToast('设备已启动！'))
    .catch(() => showToast('请确认设备已开机并连接同一 WiFi'));
}

function restart() {
  Object.keys(images).forEach(k => delete images[k]);
  document.getElementById('result-view').style.display = 'none';
  document.getElementById('upload-view').style.display = 'block';
  renderZones();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

renderZones();
</script>
</body>
</html>
