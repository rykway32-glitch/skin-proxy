<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI 皮肤分析</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#f7f7f7;color:#1a1a1a;min-height:100vh}
.page{display:none}.page.active{display:block}
.container{max-width:480px;margin:0 auto;padding:24px 16px}
.logo{text-align:center;padding:40px 0 32px}
.logo h1{font-size:24px;font-weight:600;margin-bottom:8px}
.logo p{font-size:14px;color:#888;line-height:1.6}
.logo-icon{width:72px;height:72px;background:linear-gradient(135deg,#1D9E75,#0F6E56);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:36px}
.big-btn{width:100%;padding:16px;border-radius:14px;font-size:16px;font-weight:500;cursor:pointer;border:none;margin-bottom:12px;transition:all .2s}
.btn-primary{background:#1D9E75;color:#fff}
.btn-primary:hover{background:#0F6E56}
.btn-secondary{background:#fff;color:#333;border:1px solid #e0e0e0}
.tip-row{display:flex;gap:8px;margin-top:8px}
.tip-item{flex:1;background:#fff;border-radius:12px;padding:12px 8px;text-align:center;font-size:12px;color:#666;line-height:1.5}
.tip-item span{display:block;font-size:20px;margin-bottom:4px}
.cam-wrap{position:relative;background:#000;border-radius:20px;overflow:hidden;aspect-ratio:3/4;width:100%;margin-bottom:16px}
#video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#canvas{display:none}
.face-guide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.face-oval{width:62%;aspect-ratio:3/4;border:2.5px solid rgba(29,158,117,.9);border-radius:50%;position:relative;box-shadow:0 0 0 2000px rgba(0,0,0,.25)}
.zone-label{position:absolute;font-size:11px;color:#fff;background:rgba(29,158,117,.8);padding:3px 9px;border-radius:10px;white-space:nowrap;font-weight:500}
.lbl-forehead{top:-14px;left:50%;transform:translateX(-50%)}
.lbl-nose{top:44%;left:50%;transform:translateX(-50%)}
.lbl-lcheek{top:52%;left:-58px}
.lbl-rcheek{top:52%;right:-58px}
.lbl-chin{bottom:-14px;left:50%;transform:translateX(-50%)}
.cam-hint{position:absolute;top:14px;left:0;right:0;text-align:center;font-size:13px;color:rgba(255,255,255,.95);text-shadow:0 1px 3px rgba(0,0,0,.6);font-weight:500}
.shutter{width:72px;height:72px;border-radius:50%;background:#fff;border:4px solid #1D9E75;margin:0 auto;cursor:pointer;transition:transform .1s;display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 4px 16px rgba(29,158,117,.3)}
.shutter:active{transform:scale(.9)}
.cam-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cam-side-btn{padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;background:#fff;border:1px solid #ddd;color:#555}
.preview-img{width:100%;border-radius:20px;margin-bottom:16px;display:block}
.confirm-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.loading-page{text-align:center;padding:60px 16px}
.spinner{width:52px;height:52px;border:3px solid #eee;border-top-color:#1D9E75;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-page h2{font-size:18px;font-weight:500;margin-bottom:8px}
.loading-page p{font-size:14px;color:#888;line-height:1.6}
.loading-steps{margin-top:28px;text-align:left;background:#fff;border-radius:16px;padding:16px}
.l-step{display:flex;align-items:center;gap:10px;padding:9px 0;font-size:13px;color:#ccc;transition:color .4s;border-bottom:1px solid #f5f5f5}
.l-step:last-child{border:none;padding-bottom:0}
.l-step.active{color:#1D9E75;font-weight:500}
.l-step.done{color:#aaa}
.l-dot{width:8px;height:8px;border-radius:50%;background:#e8e8e8;flex-shrink:0;transition:background .4s}
.l-step.active .l-dot{background:#1D9E75;box-shadow:0 0 0 3px rgba(29,158,117,.2)}
.l-step.done .l-dot{background:#aaa}
.result-hero{background:linear-gradient(135deg,#1D9E75,#0F6E56);border-radius:20px;padding:24px;color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:16px}
.score-big{text-align:center;flex-shrink:0;width:64px}
.score-big .num{font-size:44px;font-weight:700;line-height:1}
.score-big .lbl{font-size:11px;opacity:.75;margin-top:3px}
.hero-text h2{font-size:16px;font-weight:600;margin-bottom:5px}
.hero-text p{font-size:13px;opacity:.88;line-height:1.55}
.result-card{background:#fff;border-radius:16px;padding:16px 20px;margin-bottom:12px}
.result-card h3{font-size:11px;color:#bbb;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px}
.zone-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f5f5f5}
.zone-row:last-child{border:none;padding-bottom:2px}
.zone-name{font-size:14px;font-weight:500;margin-bottom:3px}
.zone-cond{font-size:12px;color:#999;line-height:1.4;max-width:195px}
.prog-badge{font-size:12px;padding:4px 12px;border-radius:20px;font-weight:500;flex-shrink:0;margin-top:2px}
.b-hydration{background:#E6F1FB;color:#185FA5}
.b-pore_tighten{background:#EEEDFE;color:#534AB7}
.b-dry_care{background:#FAEEDA;color:#854F0B}
.b-oil_control{background:#FAECE7;color:#993C1D}
.start-btn{width:100%;padding:16px;background:#1D9E75;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:500;cursor:pointer;margin-bottom:10px;box-shadow:0 4px 16px rgba(29,158,117,.3)}
.start-btn:active{background:#0F6E56}
.retry-btn{width:100%;padding:13px;background:transparent;color:#999;border:1px solid #e0e0e0;border-radius:14px;font-size:14px;cursor:pointer}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:11px 22px;border-radius:22px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- 首页 -->
<div id="page-home" class="page active">
<div class="container">
  <div class="logo">
    <div class="logo-icon">🔬</div>
    <h1>AI 皮肤分析</h1>
    <p>拍一张正脸照片<br>AI 自动识别5个区域，匹配专属护肤程序</p>
  </div>
  <button class="big-btn btn-primary" onclick="startCamera()">📷 &nbsp;现场拍摄分析</button>
  <button class="big-btn btn-secondary" onclick="document.getElementById('upload-input').click()">🖼️ &nbsp;从相册上传照片</button>
  <input type="file" id="upload-input" accept="image/*" style="display:none" onchange="handleUpload(this)">
  <div class="tip-row">
    <div class="tip-item"><span>☀️</span>光线充足</div>
    <div class="tip-item"><span>🚫</span>素颜拍摄</div>
    <div class="tip-item"><span>📏</span>正脸平视</div>
    <div class="tip-item"><span>✨</span>关闭美颜</div>
  </div>
</div>
</div>

<!-- 摄像头页 -->
<div id="page-camera" class="page">
<div class="container">
  <div class="cam-bar">
    <button class="cam-side-btn" onclick="goHome()">← 返回</button>
    <span style="font-size:14px;font-weight:500">对准面部拍摄</span>
    <button class="cam-side-btn" onclick="flipCamera()">🔄 翻转</button>
  </div>
  <div class="cam-wrap">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="face-guide">
      <div class="face-oval">
        <div class="zone-label lbl-forehead">额头</div>
        <div class="zone-label lbl-nose">鼻翼</div>
        <div class="zone-label lbl-lcheek">左脸颊</div>
        <div class="zone-label lbl-rcheek">右脸颊</div>
        <div class="zone-label lbl-chin">下巴</div>
      </div>
    </div>
    <div class="cam-hint">将脸部对准绿色椭圆框内</div>
  </div>
  <div style="text-align:center">
    <div class="shutter" onclick="capturePhoto()">📸</div>
    <p style="font-size:13px;color:#aaa;margin-top:12px">点击按钮拍摄</p>
  </div>
</div>
</div>

<!-- 预览确认页 -->
<div id="page-preview" class="page">
<div class="container">
  <p style="font-size:16px;font-weight:500;margin-bottom:16px">确认照片</p>
  <img id="preview-img" class="preview-img" alt="皮肤照片预览">
  <p style="font-size:13px;color:#888;margin-bottom:16px">请确认面部清晰可见、光线充足、没有遮挡</p>
  <div class="confirm-row">
    <button class="big-btn btn-secondary" onclick="retakePhoto()" style="margin:0">重新拍摄</button>
    <button class="big-btn btn-primary" onclick="startAnalysis()" style="margin:0">开始分析 →</button>
  </div>
</div>
</div>

<!-- 加载页 -->
<div id="page-loading" class="page">
<div class="container">
  <div class="loading-page">
    <div class="spinner"></div>
    <h2>AI 正在分析皮肤状态</h2>
    <p>识别额头、鼻翼、脸颊、下巴<br>匹配最适合的护肤程序</p>
    <div class="loading-steps">
      <div class="l-step active" id="ls1"><div class="l-dot"></div>上传照片中…</div>
      <div class="l-step" id="ls2"><div class="l-dot"></div>识别面部5个区域…</div>
      <div class="l-step" id="ls3"><div class="l-dot"></div>分析各区域皮肤状态…</div>
      <div class="l-step" id="ls4"><div class="l-dot"></div>匹配专属护肤程序…</div>
    </div>
  </div>
</div>
</div>

<!-- 结果页 -->
<div id="page-result" class="page">
<div class="container" id="result-container" style="padding-bottom:32px"></div>
</div>

<div class="toast" id="toast"></div>

<div class="toast" id="toast"></div>

<script>
  // 1. 压缩图片函数
  async function compressImage(dataUrl) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxW = 800;
        const ratio = Math.min(maxW / img.width, maxW / img.height, 1);
        canvas.width = img.width * ratio;
        canvas.height = img.height * ratio;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.6).split(',')[1]);
      };
      img.src = dataUrl;
    });
  }

  // 2. 基础配置与变量
  const PROXY_URL = 'https://skin-proxy-flax.vercel.app/api/skin-analyze';
  const PROG = {
    hydration: { label: '补水', cls: 'b-hydration' },
    pore_tighten: { label: '收缩毛孔', cls: 'b-pore_tighten' },
    dry_care: { label: '干燥护理', cls: 'b-dry_care' },
    oil_control: { label: '出油护理', cls: 'b-oil_control' },
  };

  let stream = null;
  let facingMode = 'user';
  let capturedImage = null;
  let loadingTimer = null;

  // 3. 页面路由
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const target = document.getElementById(id);
    if (target) target.classList.add('active');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // 4. 摄像头控制
  async function startCamera() {
    try {
      if (stream) stopCamera();
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      document.getElementById('video').srcObject = stream;
    } catch (err) {
      console.error(err);
      showToast('无法打开摄像头，请检查权限');
    }
  }

  function stopCamera() {
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
      stream = null;
    }
  }

  function toggleCamera() {
    facingMode = facingMode === 'user' ? 'environment' : 'user';
    startCamera();
  }

  function capturePhoto() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    if (!stream) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    capturedImage = canvas.toDataURL('image/jpeg');
    document.getElementById('preview-img').src = capturedImage;
    stopCamera();
    showPage('page-preview');
  }

  function retakePhoto() {
    showPage('page-capture');
    startCamera();
  }

  // 5. AI 分析逻辑
  function startAnalysis() {
    if (!capturedImage) return;
    showPage('page-loading');
    let step = 1;
    document.querySelectorAll('.l-step').forEach(s => s.classList.remove('active', 'done'));
    document.getElementById('ls1').classList.add('active');

    loadingTimer = setInterval(() => {
      document.getElementById(`ls${step}`).classList.remove('active');
      document.getElementById(`ls${step}`).classList.add('done');
      step++;
      if (step <= 4) {
        document.getElementById(`ls${step}`).classList.add('active');
      } else {
        clearInterval(loadingTimer);
      }
    }, 1500);

    compressImage(capturedImage).then(base64Str => {
      return fetch(PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: base64Str })
      });
    })
    .then(res => {
      if (!res.ok) throw new Error('分析失败');
      return res.json();
    })
    .then(data => {
      clearInterval(loadingTimer);
      renderResult(data);
      showPage('page-result');
    })
    .catch(err => {
      clearInterval(loadingTimer);
      console.error(err);
      showToast('分析出错，请重试');
      showPage('page-capture');
      startCamera();
    });
  }

  // 6. 结果渲染
  function renderResult(data) {
    const container = document.getElementById('result-container');
    let html = `
      <div class="result-header">
        <div class="score-circle">
          <div class="score-num">${data.score || 85}</div>
          <div class="score-label">综合评分</div>
        </div>
        <h2 style="margin-top:16px;font-size:20px">${data.skin_type || '混合性肌肤'}</h2>
      </div>
      <div class="report-card">
        <h3>📊 区域状态分析</h3>
    `;
    
    if (data.zones && Array.isArray(data.zones)) {
      data.zones.forEach(z => {
        html += `
          <div class="zone-item">
            <span class="zone-name">${z.zone}</span>
            <span class="zone-status">${z.status}</span>
          </div>
        `;
      });
    } else {
      html += '<p style="color:#888;font-size:14px">暂无区域详细数据</p>';
    }
    
    html += `
      </div>
      <div class="report-card">
        <h3>💡 专属护肤程序推荐</h3>
    `;
    
    if (data.programs && Array.isArray(data.programs)) {
      data.programs.forEach(p => {
        const meta = PROG[p.id] || { label: p.id, cls: 'b-hydration' };
        html += `
          <div class="prog-item ${meta.cls}">
            <div class="prog-title">${meta.label}</div>
            <div class="prog-desc">${p.desc}</div>
          </div>
        `;
      });
    } else {
      html += '<p style="color:#888;font-size:14px">暂无推荐程序</p>';
    }
    
    html += `
      </div>
      <button class="big-btn btn-primary" onclick="retakePhoto()" style="margin-top:24px">重新测试</button>
    `;
    container.innerHTML = html;
  }

  // 初始化启动
  window.onload = () => {
    showPage('page-capture');
    startCamera();
  };
</script>
